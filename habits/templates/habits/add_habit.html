{% extends 'base.html' %}
{% load static %}
{% block css %}
<link rel="stylesheet" href="{% static 'habits/add_habit.css' %}">
{% endblock %}
{% block content %}

      <div class="page-wrapper">
    <div class="form-container">

        <h2>Add Habit</h2>

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label>Name:</label>
                <input type="text" name="name" required>
            </div>

            <button type="submit" class="btn">Save</button>
        </form>

    </div>
</div>

{% endblock %}
